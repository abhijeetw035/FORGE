services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge_user -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: forge-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - DATABASE_URL=postgresql://forge_user:forge_pass@postgres:5432/forge
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  miner:
    build:
      context: ./miner
      dockerfile: Dockerfile
    container_name: forge-miner
    volumes:
      - ./miner:/app
      - ./storage:/storage
      - miner_tree_sitter:/app/tree_sitter_builds
    environment:
      - DATABASE_URL=postgresql://forge_user:forge_pass@postgres:5432/forge
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  miner_tree_sitter:
